<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FeatureTrack</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f9fafb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit;outline:none}
.spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#f1f5f9}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useMemo} = React;

// ─────────────────────────────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────────────────────────────
const GIST_ID    = "d8a024c319d8ec7061ce6d7d94b5f3f4";
const GIST_FILE  = "featuretrack-db.json";
const GIST_TOKEN = "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";
const ANTH_KEY   = ""; // Optional: paste your Anthropic API key for AI Insights

// ─────────────────────────────────────────────────────────────────────────────
// GIST API — single source of truth for all data
// ─────────────────────────────────────────────────────────────────────────────
const GIST_URL = "https://api.github.com/gists/" + GIST_ID;
const gistHeaders = {
  "Authorization": "token " + GIST_TOKEN,
  "Accept": "application/vnd.github.v3+json",
  "Content-Type": "application/json",
  "User-Agent": "FeatureTrack"
};
const loadData = async () => {
  const r = await fetch(GIST_URL, {headers: gistHeaders});
  if (!r.ok) throw new Error(r.status);
  const d = await r.json();
  return JSON.parse(d.files[GIST_FILE] ? d.files[GIST_FILE].content : "[]");
};
const saveData = async (records) => {
  const body = {files: {}};
  body.files[GIST_FILE] = {content: JSON.stringify(records)};
  const r = await fetch(GIST_URL, {method:"PATCH", headers: gistHeaders, body: JSON.stringify(body)});
  if (!r.ok) throw new Error(r.status);
};
const normalizeRecord = (r) => ({
  ...r,
  client: Array.isArray(r.client) ? r.client : (r.client ? [r.client] : [])
});

// ─────────────────────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────────────────────
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);
const STATUS = {
  Backlog:   {bg:"#f1f5f9", color:"#475569", dot:"#94a3b8"},
  Accepted:  {bg:"#dbeafe", color:"#1d4ed8", dot:"#3b82f6"},
  Completed: {bg:"#d1fae5", color:"#065f46", dot:"#10b981"}
};
const PRI = {
  Low:    {color:"#64748b", bg:"#f8fafc", border:"#e2e8f0"},
  Medium: {color:"#d97706", bg:"#fffbeb", border:"#fde68a"},
  High:   {color:"#dc2626", bg:"#fef2f2", border:"#fecaca"}
};
const normalizeStatus = (v) => {
  if (!v) return "Backlog";
  const s = v.toString().toLowerCase();
  if (/complet|done|released?|shipped|closed|resolved/.test(s)) return "Completed";
  if (/accept|approv|in.?progress|planned|active|scheduled/.test(s)) return "Accepted";
  return "Backlog";
};
const normalizePriority = (v) => {
  if (!v) return "Medium";
  const s = v.toString().toLowerCase();
  if (/high|p1|critical|urgent|must/.test(s)) return "High";
  if (/low|p3|p4|nice|minor|wish/.test(s)) return "Low";
  return "Medium";
};
const parseDate = (v) => {
  if (!v) return new Date().toISOString();
  if (v instanceof Date) return isNaN(v) ? new Date().toISOString() : v.toISOString();
  const d = new Date(v);
  return isNaN(d) ? new Date().toISOString() : d.toISOString();
};

// ─────────────────────────────────────────────────────────────────────────────
// XLSX IMPORT
// ─────────────────────────────────────────────────────────────────────────────
const FIELD_PATTERNS = {
  title:           /title|request.?name|feature.?name|fer.?name|summary|subject/i,
  description:     /description|details?|notes?|comments?|use.?case|background/i,
  client:          /client|customer|account|company|org/i,
  productArea:     /product.?area|^area$/i,
  product:         /product/i,
  engagementFormat:/ebc|events?|reference|engagement.?format/i,
  priority:        /priority|urgency|severity/i,
  status:          /^status$|stage|state/i,
  submittedBy:     /submitted.?by|requestor|owner|csm|rep|requested.?by/i,
  date:            /date|submitted.?date|created.?date/i,
  tags:            /tag|label/i
};
const detectColumns = (headers) => {
  const map = {};
  headers.forEach((h) => {
    if (!h) return;
    const t = h.toString().trim();
    for (const field in FIELD_PATTERNS) {
      if (!map[field] && FIELD_PATTERNS[field].test(t)) { map[field] = h; break; }
    }
  });
  return map;
};
const mapRow = (row, colMap, allHeaders) => {
  const g = (f) => { const c = colMap[f]; return c !== undefined ? row[c] : undefined; };
  const str = (v) => (v !== null && v !== undefined && v !== '') ? v.toString().trim() : '';
  const mappedCols = new Set(Object.values(colMap));
  const tags = [];
  const tagVal = str(g('tags'));
  if (tagVal) tagVal.split(/[,;|]/).forEach((t) => { const x = t.trim(); if (x) tags.push(x); });
  allHeaders.forEach((h) => { if (!mappedCols.has(h) && h) { const v = str(row[h]); if (v) tags.push(h + ": " + v); } });
  const clientRaw = str(g('client'));
  return {
    id: uid(),
    title: str(g('title')) || str(g('description')).slice(0,60) || 'Untitled',
    description: str(g('description')),
    client: clientRaw ? clientRaw.split(/[,;]/).map((c) => c.trim()).filter(Boolean) : [],
    product: str(g('product')),
    productArea: str(g('productArea')),
    engagementFormat: str(g('engagementFormat')),
    submittedBy: str(g('submittedBy')),
    priority: normalizePriority(g('priority')),
    status: normalizeStatus(g('status')),
    tags: tags,
    createdAt: parseDate(g('date')),
    updatedAt: parseDate(g('date'))
  };
};
const parseXLSX = (buf) => {
  const wb = XLSX.read(buf, {type:'array', cellDates:true});
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rawRows = XLSX.utils.sheet_to_json(ws, {defval:''});
  if (!rawRows.length) return {rows:[], rawRows:[], headers:[], colMap:{}};
  const headers = Object.keys(rawRows[0]);
  const colMap = detectColumns(headers);
  return {rows: rawRows.map((r) => mapRow(r, colMap, headers)), rawRows: rawRows, headers: headers, colMap: colMap};
};
parseXLSX.remap = (rawRows, headers, colMap) => rawRows.map((r) => mapRow(r, colMap, headers));

// ─────────────────────────────────────────────────────────────────────────────
// ICONS
// ─────────────────────────────────────────────────────────────────────────────
const SVG = ({d, size, color, style}) => {
  size = size || 16; color = color || "currentColor"; style = style || {};
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={style}>
      {Array.isArray(d) ? d.map((p,i) => <path key={i} d={p}/>) : <path d={d}/>}
    </svg>
  );
};
const IC = {
  zap:    "M13 2L3 14h9l-1 8 10-12h-9z",
  plus:   ["M12 5v14","M5 12h14"],
  list:   ["M9 6h11","M9 12h11","M9 18h11","M4 6h.01","M4 12h.01","M4 18h.01"],
  bar:    ["M18 20V10","M12 20V4","M6 20v-6"],
  spark:  ["M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3M6.343 6.343l-.707-.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"],
  upload: ["M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4","M17 8l-5-5-5 5","M12 3v12"],
  x:      ["M18 6L6 18","M6 6l12 12"],
  check:  "M20 6L9 17l-5-5",
  chevD:  "M6 9l6 6 6-6",
  chevU:  "M18 15l-6-6-6 6",
  spin:   "M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15",
  file:   ["M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z","M14 2v6h6"],
  back:   ["M19 12H5","M12 19l-7-7 7-7"],
  trash:  ["M3 6h18","M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"],
  settings: ["M12 15a3 3 0 100-6 3 3 0 000 6z","M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"]
};

// ─────────────────────────────────────────────────────────────────────────────
// UI PRIMITIVES
// ─────────────────────────────────────────────────────────────────────────────
const Card = ({children, style}) => (
  <div style={Object.assign({background:"#fff",borderRadius:12,border:"1px solid #e5e7eb",padding:20},style||{})}>{children}</div>
);
const StatusPill = ({status}) => (
  <span style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:999,background:STATUS[status].bg,color:STATUS[status].color}}>
    <span style={{width:6,height:6,borderRadius:"50%",background:STATUS[status].dot,flexShrink:0}}/>{status}
  </span>
);
const PriBadge = ({p}) => (
  <span style={{fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:999,border:"1px solid "+PRI[p].border,color:PRI[p].color,background:PRI[p].bg}}>{p}</span>
);
const Tag = ({children}) => (
  <span style={{fontSize:11,background:"#f8fafc",color:"#475569",border:"1px solid #e2e8f0",borderRadius:999,padding:"2px 8px"}}>{children}</span>
);
const Btn = ({onClick, disabled, style, children}) => (
  <button onClick={onClick} disabled={disabled} style={Object.assign({border:"none",borderRadius:8,padding:"8px 16px",fontSize:13,fontWeight:600,cursor:disabled?"not-allowed":"pointer"},style||{})}>{children}</button>
);
const IS = {width:"100%",border:"1px solid #d1d5db",borderRadius:8,padding:"8px 12px",fontSize:13,background:"#fff"};
const SL = ({children}) => <p style={{fontSize:10,fontWeight:700,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.8px",margin:"0 0 8px"}}>{children}</p>;

// ─────────────────────────────────────────────────────────────────────────────
// MULTI-SELECT FIELD (Client)
// ─────────────────────────────────────────────────────────────────────────────
const MultiSelectField = ({label, values, onChange, listId, options}) => {
  const [input, setInput] = useState("");
  values = values || []; options = options || [];
  const add = (val) => {
    const v = val.trim();
    if (v && values.indexOf(v) === -1) onChange(values.concat([v]));
    setInput("");
  };
  const remove = (v) => onChange(values.filter((x) => x !== v));
  const isNew = input.trim() && options.indexOf(input.trim()) === -1 && values.indexOf(input.trim()) === -1;
  return (
    <div>
      <label style={{fontSize:13,fontWeight:500,color:"#374151",display:"block",marginBottom:6}}>{label}</label>
      <div style={{border:"1px solid #d1d5db",borderRadius:8,padding:"6px 10px",background:"#fff",minHeight:42}}>
        {values.length > 0 && (
          <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
            {values.map((v) => (
              <span key={v} style={{display:"inline-flex",alignItems:"center",gap:4,padding:"3px 8px",background:"#eef2ff",color:"#4f46e5",borderRadius:999,fontSize:12,fontWeight:500}}>
                {v}
                <button onClick={() => remove(v)} style={{background:"none",border:"none",cursor:"pointer",color:"#4f46e5",padding:0,lineHeight:1,display:"flex"}}>
                  <SVG d={IC.x} size={10}/>
                </button>
              </span>
            ))}
          </div>
        )}
        <div style={{display:"flex",gap:6}}>
          <input list={listId} value={input}
            onChange={(e) => {
              const v = e.target.value;
              setInput(v);
              if (options.indexOf(v) !== -1 && values.indexOf(v) === -1) { onChange(values.concat([v])); setInput(""); }
            }}
            onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); add(input); } }}
            placeholder={values.length ? "Add another client…" : "Type client name…"}
            style={{flex:1,border:"none",fontSize:13,padding:"2px 0",outline:"none",background:"transparent"}}/>
          {input.trim() && <button onClick={() => add(input)} style={{border:"none",background:"none",cursor:"pointer",color:"#4f46e5",fontSize:12,fontWeight:600,padding:"0 4px"}}>Add</button>}
        </div>
      </div>
      <datalist id={listId}>{options.filter((o) => values.indexOf(o) === -1).map((v) => <option key={v} value={v}/>)}</datalist>
      {isNew && <p style={{fontSize:10,color:"#d97706",marginTop:4}}>✦ New client — will be added to the list on save</p>}
    </div>
  );
};

// ─────────────────────────────────────────────────────────────────────────────
// CLASS FIELD (single-select with free-type)
// ─────────────────────────────────────────────────────────────────────────────
const ClassField = ({label, value, onChange, listId, options}) => {
  options = options || [];
  const isNew = value && options.indexOf(value) === -1;
  return (
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:6}}>
        <label style={{fontSize:13,fontWeight:500,color:"#374151"}}>{label}</label>
        <span style={{fontSize:10,color:"#9ca3af"}}>Select or type new</span>
      </div>
      <input list={listId} value={value} onChange={(e) => onChange(e.target.value)}
        placeholder="Choose existing or type to add new…"
        style={Object.assign({},IS,{background:isNew?"#fffbeb":"#fff"})}/>
      <datalist id={listId}>{options.map((v) => <option key={v} value={v}/>)}</datalist>
      {isNew && <p style={{fontSize:10,color:"#d97706",marginTop:4}}>✦ New value — will be added to the list on save</p>}
    </div>
  );
};

const ClassFields = ({f, set, lists, pfx}) => (
  <div>
    <SL>Classifications</SL>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
      <ClassField label="Product *" value={f.product} onChange={(v) => set("product",v)} listId={pfx+"pl"} options={lists.products}/>
      <ClassField label="Product Area" value={f.productArea} onChange={(v) => set("productArea",v)} listId={pfx+"al"} options={lists.productAreas}/>
    </div>
    <ClassField label="Engagement Format" value={f.engagementFormat} onChange={(v) => set("engagementFormat",v)} listId={pfx+"ef"} options={lists.engagementFormats}/>
  </div>
);

// ─────────────────────────────────────────────────────────────────────────────
// MARKDOWN
// ─────────────────────────────────────────────────────────────────────────────
const bold = (txt) => txt.split(/(\*\*[^*]+\*\*)/).map((p,i) =>
  p.startsWith("**") && p.endsWith("**") ? <strong key={i}>{p.slice(2,-2)}</strong> : p
);
const MD = ({text}) => (
  <div style={{lineHeight:1.7}}>
    {text.split("\n").map((ln,i) => {
      if (!ln.trim()) return <div key={i} style={{height:8}}/>;
      if (ln.startsWith("### ")) return <p key={i} style={{fontWeight:600,fontSize:13,margin:"14px 0 4px"}}>{ln.slice(4)}</p>;
      if (ln.startsWith("## "))  return <p key={i} style={{fontWeight:700,fontSize:15,margin:"18px 0 6px"}}>{ln.slice(3)}</p>;
      const bul = ln.match(/^[-*]\s(.+)/);
      if (bul) return <p key={i} style={{fontSize:13,margin:"3px 0",paddingLeft:12}}>{"• "}{bold(bul[1])}</p>;
      return <p key={i} style={{fontSize:13,margin:"3px 0"}}>{bold(ln)}</p>;
    })}
  </div>
);

// ─────────────────────────────────────────────────────────────────────────────
// MANAGE LISTS
// ─────────────────────────────────────────────────────────────────────────────
const ManageView = ({lists, onDelete}) => {
  const [confirming, setConfirming] = useState(null);
  const fields = [
    {key:"product",          label:"Product",           values:lists.products},
    {key:"productArea",      label:"Product Area",       values:lists.productAreas},
    {key:"engagementFormat", label:"Engagement Format",  values:lists.engagementFormats},
    {key:"client",           label:"Client",             values:lists.clients}
  ];
  return (
    <div style={{maxWidth:700,margin:"0 auto",display:"flex",flexDirection:"column",gap:20}}>
      <div>
        <h2 style={{fontSize:18,fontWeight:700,color:"#111827",marginBottom:4}}>Manage Classifications</h2>
        <p style={{fontSize:13,color:"#6b7280"}}>Permanently remove a value from a field. It will be removed from all existing requests and from future dropdowns.</p>
      </div>
      {fields.map(({key, label, values}) => (
        <Card key={key}>
          <p style={{fontWeight:600,fontSize:14,color:"#111827",marginBottom:14}}>{label}</p>
          {!values.length
            ? <p style={{fontSize:13,color:"#9ca3af",fontStyle:"italic"}}>No values yet</p>
            : values.map((v) => (
              <div key={v} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid #f3f4f6"}}>
                <span style={{fontSize:13,color:"#374151"}}>{v}</span>
                {confirming && confirming.field === key && confirming.value === v
                  ? <div style={{display:"flex",gap:8,alignItems:"center"}}>
                      <span style={{fontSize:12,color:"#dc2626",fontWeight:500}}>Remove from all records?</span>
                      <button onClick={() => { onDelete(key, v); setConfirming(null); }} style={{padding:"4px 10px",borderRadius:6,fontSize:11,fontWeight:600,background:"#dc2626",color:"#fff",border:"none",cursor:"pointer"}}>Yes, remove</button>
                      <button onClick={() => setConfirming(null)} style={{padding:"4px 10px",borderRadius:6,fontSize:11,fontWeight:600,background:"#f3f4f6",color:"#6b7280",border:"none",cursor:"pointer"}}>Cancel</button>
                    </div>
                  : <button onClick={() => setConfirming({field:key,value:v})} style={{display:"flex",alignItems:"center",gap:4,padding:"4px 10px",borderRadius:6,fontSize:11,fontWeight:500,background:"#fef2f2",color:"#dc2626",border:"1px solid #fecaca",cursor:"pointer"}}>
                      <SVG d={IC.trash} size={11} color="#dc2626"/> Remove
                    </button>
                }
              </div>
            ))
          }
        </Card>
      ))}
    </div>
  );
};

// ─────────────────────────────────────────────────────────────────────────────
// DASHBOARD
// ─────────────────────────────────────────────────────────────────────────────
const Dashboard = ({reqs, onImport, onNavigate, onStatus}) => {
  const [selected, setSelected] = useState(null);
  const byStatus = useMemo(() => {
    const m = {Backlog:0,Accepted:0,Completed:0};
    reqs.forEach((r) => { m[r.status] = (m[r.status]||0) + 1; });
    return m;
  }, [reqs]);
  const topN = (key, n) => {
    n = n || 6;
    const m = {};
    reqs.forEach((r) => { const v = r[key]; if (v) m[v] = (m[v]||0) + 1; });
    return Object.entries(m).sort((a,b) => b[1]-a[1]).slice(0,n);
  };
  const topProds   = useMemo(() => topN('product'),          [reqs]);
  const topAreas   = useMemo(() => topN('productArea'),      [reqs]);
  const topFormats = useMemo(() => topN('engagementFormat'), [reqs]);
  const topClients = useMemo(() => {
    const m = {};
    reqs.forEach((r) => (r.client||[]).forEach((c) => { if (c) m[c] = (m[c]||0) + 1; }));
    return Object.entries(m).sort((a,b) => b[1]-a[1]).slice(0,6);
  }, [reqs]);
  const recent = useMemo(() => reqs.slice().sort((a,b) => new Date(b.createdAt)-new Date(a.createdAt)).slice(0,6), [reqs]);

  const renderBar = (items, color, filterKey) => {
    if (!items.length) return <p style={{fontSize:13,color:"#9ca3af",fontStyle:"italic"}}>No data</p>;
    return (
      <div>{items.map(([k,v]) => (
        <button key={k} onClick={() => onNavigate({[filterKey]:k})}
          style={{display:"block",width:"100%",textAlign:"left",background:"none",border:"none",padding:"5px 6px",borderRadius:6,cursor:"pointer",marginBottom:4}}
          onMouseEnter={(e) => e.currentTarget.style.background="#eef2ff"}
          onMouseLeave={(e) => e.currentTarget.style.background="none"}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:3}}>
            <span style={{color:"#374151",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{k}</span>
            <span style={{color:"#6b7280",marginLeft:8,fontWeight:500,flexShrink:0}}>{v}</span>
          </div>
          <div style={{height:6,background:"#f3f4f6",borderRadius:999}}>
            <div style={{height:6,borderRadius:999,width:(v/items[0][1]*100)+"%",background:color}}/>
          </div>
        </button>
      ))}</div>
    );
  };

  return (
    <div style={{display:"flex",flexDirection:"column",gap:20}}>
      {reqs.length === 0 && (
        <div style={{background:"#eef2ff",border:"1px solid #c7d2fe",borderRadius:12,padding:20,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <p style={{fontWeight:600,color:"#3730a3",marginBottom:4}}>No requests yet</p>

// ─────────────────────────────────────────────────────────────────────────────
// IMPORT
// ─────────────────────────────────────────────────────────────────────────────
const FIELD_LABELS = {title:"Title",description:"Description",client:"Client",product:"Product",productArea:"Product Area",engagementFormat:"Engagement Format",priority:"Priority",status:"Status",submittedBy:"Submitted By",date:"Date",tags:"Tags"};

const ImportView = ({onImport, onDone}) => {
  const [step, setStep] = useState("upload");
  const [preview, setPreview] = useState(null);
  const [error, setError] = useState(null);
  const [importing, setImporting] = useState(false);
  const handleFile = async (e) => {
    const f = e.target.files[0]; if (!f) return;
    try { const buf = await f.arrayBuffer(); setPreview(parseXLSX(new Uint8Array(buf))); setStep("preview"); }
    catch(err) { setError("Could not read file: " + err.message); }
  };
  const confirm = () => { setImporting(true); onImport(preview.rows); setTimeout(() => onDone(), 1200); };
  const updateMapping = (field, col) => setPreview((p) => {
    const colMap = Object.assign({}, p.colMap, {[field]: col || undefined});
    return Object.assign({}, p, {colMap: colMap, rows: parseXLSX.remap(p.rawRows, p.headers, colMap)});
  });

  if (step === "preview" && preview) {
    const unmapped = preview.headers.filter((h) => Object.values(preview.colMap).indexOf(h) === -1);
    return (
      <div style={{maxWidth:820,margin:"0 auto",display:"flex",flexDirection:"column",gap:20}}>
        <Card>
          <h2 style={{fontSize:17,fontWeight:700,color:"#111827",marginBottom:4}}>Import Preview</h2>
          <p style={{fontSize:13,color:"#6b7280",marginBottom:20}}>Found <strong>{preview.rows.length} records</strong>. Verify the column mapping then import.</p>
          <div style={{background:"#f8fafc",borderRadius:12,padding:16,marginBottom:20}}>
            <SL>Column Mapping — adjust any that look wrong</SL>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
              {Object.keys(FIELD_LABELS).map((field) => (
                <div key={field} style={{display:"flex",alignItems:"center",gap:8,background:"#fff",borderRadius:8,padding:"6px 10px",border:"1px solid #e2e8f0",fontSize:12}}>
                  <span style={{fontWeight:600,color:"#4f46e5",width:130,flexShrink:0}}>{FIELD_LABELS[field]}</span>
                  <span style={{color:"#94a3b8"}}>←</span>
                  <select value={preview.colMap[field]||""} onChange={(e) => updateMapping(field, e.target.value)} style={{flex:1,fontSize:11,border:"none",background:"transparent",color:"#475569",cursor:"pointer"}}>
                    <option value="">(unmapped)</option>
                    {preview.headers.map((h) => <option key={h} value={h}>{h}</option>)}
                  </select>
                </div>
              ))}
            </div>
            {unmapped.length > 0 && <p style={{fontSize:11,color:"#94a3b8"}}><strong>{unmapped.length} unmapped</strong> stored as tags: {unmapped.join(", ")}</p>}
          </div>
          <div style={{borderRadius:10,border:"1px solid #e5e7eb",overflow:"hidden",marginBottom:20}}>
            <div style={{overflowX:"auto",maxHeight:280}}>
              <table style={{width:"100%",fontSize:12,borderCollapse:"collapse"}}>
                <thead style={{background:"#f9fafb",position:"sticky",top:0}}>
                  <tr>{["Title","Client(s)","Product","Product Area","Engagement Format","Status","Priority"].map((h) => (
                    <th key={h} style={{textAlign:"left",padding:"8px 12px",fontWeight:600,color:"#6b7280",borderBottom:"1px solid #e5e7eb",whiteSpace:"nowrap"}}>{h}</th>
                  ))}</tr>
                </thead>
                <tbody>
                  {preview.rows.slice(0,15).map((r,i) => (
                    <tr key={i} style={{borderTop:"1px solid #f3f4f6"}}>
                      <td style={{padding:"7px 12px",fontWeight:500,color:"#1f2937",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.title}</td>
                      <td style={{padding:"7px 12px",color:"#6b7280",whiteSpace:"nowrap"}}>{(r.client||[]).join(", ")||"—"}</td>
                      <td style={{padding:"7px 12px",color:"#6b7280",whiteSpace:"nowrap"}}>{r.product||"—"}</td>
                      <td style={{padding:"7px 12px",color:"#6b7280",whiteSpace:"nowrap"}}>{r.productArea||"—"}</td>
                      <td style={{padding:"7px 12px",color:"#6b7280",whiteSpace:"nowrap"}}>{r.engagementFormat||"—"}</td>
                      <td style={{padding:"7px 12px"}}><StatusPill status={r.status}/></td>
                      <td style={{padding:"7px 12px"}}><PriBadge p={r.priority}/></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            {preview.rows.length > 15 && <p style={{textAlign:"center",fontSize:11,color:"#9ca3af",padding:"8px 0",background:"#f9fafb",borderTop:"1px solid #f3f4f6"}}>…and {preview.rows.length-15} more records</p>}
          </div>
          <Btn onClick={confirm} disabled={importing} style={{width:"100%",padding:"12px 0",background:importing?"#a5b4fc":"#4f46e5",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            {importing ? <span><span className="spin"><SVG d={IC.spin} size={15} color="#fff"/></span> Importing…</span> : "Import All " + preview.rows.length + " Records"}
          </Btn>
        </Card>
      </div>
    );
  }

  return (
    <div style={{maxWidth:460,margin:"0 auto"}}>
      <Card style={{textAlign:"center",padding:40}}>
        <SVG d={IC.file} size={40} color="#d1d5db" style={{marginBottom:16}}/>
        <h2 style={{fontSize:17,fontWeight:700,color:"#111827",marginBottom:6}}>Import Excel File</h2>
        <p style={{fontSize:13,color:"#6b7280",marginBottom:24}}>Upload your FER spreadsheet to load all records.</p>
        <label style={{display:"inline-block",padding:"10px 24px",background:"#4f46e5",color:"#fff",fontSize:13,fontWeight:600,borderRadius:10,cursor:"pointer"}}>
          Choose File (.xlsx / .xls / .csv)
          <input type="file" accept=".xlsx,.xls,.csv" onChange={handleFile} style={{display:"none"}}/>
        </label>
        {error && <p style={{fontSize:13,color:"#dc2626",marginTop:16}}>{error}</p>}
      </Card>
    </div>
  );
};

    <div>
      <label style={{fontSize:13,fontWeight:500,color:"#374151",display:"block",marginBottom:6}}>Submitted By *</label>

      <datalist id={pfx+"tm"}>{(lists.teamMembers||[]).map((v) => <option key={v} value={v}/>)}</datalist>

    <MultiSelectField label="Client(s)" values={f.client||[]} onChange={(v) => set("client",v)} listId={pfx+"cl"} options={lists.clients||[]}/>
    <div>
      <label style={{fontSize:13,fontWeight:500,color:"#374151",display:"block",marginBottom:6}}>Request Title *</label>
      <input value={f.title} onChange={(e) => set("title",e.target.value)} placeholder="Brief, descriptive title" style={IS}/>
    </div>
    <ClassFields f={f} set={set} lists={lists} pfx={pfx}/>
    <div>
      <label style={{fontSize:13,fontWeight:500,color:"#374151",display:"block",marginBottom:6}}>Priority</label>
      <div style={{display:"flex",gap:8}}>
        {["Low","Medium","High"].map((p) => (
          <button key={p} onClick={() => set("priority",p)} style={{padding:"6px 18px",borderRadius:8,fontSize:13,fontWeight:500,border:"1px solid "+(f.priority===p?PRI[p].border:"#e5e7eb"),background:f.priority===p?PRI[p].bg:"#fff",color:f.priority===p?PRI[p].color:"#6b7280"}}>{p}</button>
        ))}
      </div>
    </div>
    <div>
      <label style={{fontSize:13,fontWeight:500,color:"#374151",display:"block",marginBottom:6}}>Description *</label>
      <textarea value={f.description} onChange={(e) => set("description",e.target.value)} rows={4} placeholder="Describe the request — use case, problem it solves, expected behavior." style={Object.assign({},IS,{resize:"none"})}/>
    </div>
    <div>
      <label style={{fontSize:13,fontWeight:500,color:"#374151",display:"block",marginBottom:6}}>Tags</label>
      <div style={{display:"flex",gap:8}}>
        <input value={tagInput} onChange={(e) => setTagInput(e.target.value)} onKeyDown={(e) => { if (e.key==="Enter") { e.preventDefault(); addTag(); } }} placeholder="Type a tag and press Enter" style={Object.assign({},IS,{flex:1})}/>
        <Btn onClick={addTag} style={{background:"#f3f4f6",color:"#374151",border:"1px solid #e5e7eb"}}>Add</Btn>
      </div>
      {f.tags && f.tags.length > 0 && (
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:8}}>
          {f.tags.map((t,i) => (
            <span key={i} style={{display:"flex",alignItems:"center",gap:4,padding:"3px 10px",background:"#eef2ff",color:"#4f46e5",borderRadius:999,fontSize:12,fontWeight:500}}>
              {t}
              <button onClick={() => set("tags",f.tags.filter((_,j) => j!==i))} style={{background:"none",border:"none",cursor:"pointer",color:"#4f46e5",lineHeight:1,padding:0}}><SVG d={IC.x} size={11}/></button>
            </span>
          ))}
        </div>
      )}
    </div>
  </div>
);

// ─────────────────────────────────────────────────────────────────────────────
// SUBMIT FORM
// ─────────────────────────────────────────────────────────────────────────────
const SubmitForm = ({onSubmit, onDone, lists}) => {
  const blank = {title:"",description:"",submittedBy:"",client:[],product:"",productArea:"",engagementFormat:"",priority:"Medium",tags:[]};
  const [f, setF] = useState(blank);
  const [tag, setTag] = useState("");
  const [done, setDone] = useState(false);
  const set = (k,v) => setF((p) => Object.assign({},p,{[k]:v}));
  const addTag = () => { const t = tag.trim(); if (t && f.tags.indexOf(t)===-1) set("tags",f.tags.concat([t])); setTag(""); };
  const valid = f.title && f.submittedBy && f.product && f.description;
  const submit = () => {
    if (!valid) return;
    onSubmit(f); setF(blank); setTag(""); setDone(true);
    setTimeout(() => { setDone(false); onDone(); }, 1400);
  };
  if (done) return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:80,gap:16}}>
      <div style={{width:56,height:56,background:"#d1fae5",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}}><SVG d={IC.check} size={28} color="#065f46"/></div>
      <p style={{fontSize:17,fontWeight:600,color:"#1f2937"}}>Request Submitted!</p>
    </div>
  );
  return (
    <div style={{maxWidth:560,margin:"0 auto"}}>
      <Card style={{padding:32}}>
        <h2 style={{fontSize:18,fontWeight:700,color:"#111827",marginBottom:20}}>Submit Feature Request</h2>
        <FormBody f={f} set={set} lists={lists} pfx="s-" tagInput={tag} setTagInput={setTag} addTag={addTag}/>
        <Btn onClick={submit} disabled={!valid} style={{width:"100%",padding:"12px 0",marginTop:20,background:valid?"#4f46e5":"#f3f4f6",color:valid?"#fff":"#9ca3af",cursor:valid?"pointer":"not-allowed"}}>Submit Feature Request</Btn>
      </Card>
    </div>
  );
};

const EditModal = ({request, lists, onSave, onClose}) => {
  const [f, setF] = useState(Object.assign({},request,{client:Array.isArray(request.client)?request.client:(request.client?[request.client]:[])}));
  const [tag, setTag] = useState("");
  const set = (k,v) => setF((p) => Object.assign({},p,{[k]:v}));
  const addTag = () => { const t = tag.trim(); if (t && f.tags.indexOf(t)===-1) set("tags",f.tags.concat([t])); setTag(""); };
  const valid = f.title && f.submittedBy && f.product && f.description;
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:50,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div onClick={(e) => e.stopPropagation()} style={{background:"#fff",borderRadius:16,width:"100%",maxWidth:560,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>
        <div style={{padding:"18px 24px",borderBottom:"1px solid #f3f4f6",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <h2 style={{fontSize:16,fontWeight:700,color:"#111827"}}>Edit Request</h2>

          <div style={{display:"flex",gap:10,paddingTop:20}}>
            <Btn onClick={onClose} style={{flex:1,background:"#f3f4f6",color:"#374151",border:"1px solid #e5e7eb"}}>Cancel</Btn>

        </div>
      </div>

  );
};

// BOARD
// ─────────────────────────────────────────────────────────────────────────────
const Board = ({reqs, onStatus, onRemove, onEdit, lists, initialFilters, onBack}) => {
  initialFilters = initialFilters || {};
  const [fl, setFl] = useState(Object.assign({status:"",product:"",area:"",engagementFormat:"",client:"",q:""}, initialFilters));
  const [exp, setExp] = useState(null);
  const [editing, setEditing] = useState(null);
  const sf = (k,v) => setFl((p) => Object.assign({},p,{[k]:v}));
  const filtered = useMemo(() => reqs.filter((r) => {
    if (fl.status && r.status !== fl.status) return false;
    if (fl.product && r.product !== fl.product) return false;
    if (fl.area && r.productArea !== fl.area) return false;
    if (fl.engagementFormat && r.engagementFormat !== fl.engagementFormat) return false;
    if (fl.client && (r.client||[]).indexOf(fl.client) === -1) return false;
    if (fl.q) { const q = fl.q.toLowerCase(); return r.title.toLowerCase().includes(q) || (r.description||"").toLowerCase().includes(q) || (r.tags||[]).some((t) => t.toLowerCase().includes(q)); }
    return true;
  }), [reqs, fl]);
  const hasFilter = Object.values(fl).some(Boolean);
  const ss = {border:"1px solid #d1d5db",borderRadius:8,padding:"7px 10px",fontSize:12,background:"#fff",cursor:"pointer"};
  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {onBack && (
        <button onClick={onBack} style={{display:"flex",alignItems:"center",gap:6,background:"none",border:"none",cursor:"pointer",fontSize:13,fontWeight:500,color:"#4f46e5",alignSelf:"flex-start"}}>
          <SVG d={IC.back} size={15} color="#4f46e5"/> Back to Dashboard
        </button>
      )}
      <Card style={{display:"flex",flexDirection:"column",gap:10}}>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,alignItems:"center"}}>
          <input value={fl.q} onChange={(e) => sf("q",e.target.value)} placeholder="Search title, description, tags…" style={Object.assign({},ss,{flex:1,minWidth:180})}/>
          <select value={fl.status} onChange={(e) => sf("status",e.target.value)} style={ss}><option value="">Status: All</option>{Object.keys(STATUS).map((s) => <option key={s}>{s}</option>)}</select>
          <select value={fl.product} onChange={(e) => sf("product",e.target.value)} style={ss}><option value="">Product: All</option>{(lists.products||[]).map((p) => <option key={p}>{p}</option>)}</select>
          <select value={fl.area} onChange={(e) => sf("area",e.target.value)} style={ss}><option value="">Area: All</option>{(lists.productAreas||[]).map((a) => <option key={a}>{a}</option>)}</select>
          <select value={fl.engagementFormat} onChange={(e) => sf("engagementFormat",e.target.value)} style={ss}><option value="">Format: All</option>{(lists.engagementFormats||[]).map((e) => <option key={e}>{e}</option>)}</select>
          <select value={fl.client} onChange={(e) => sf("client",e.target.value)} style={ss}><option value="">Client: All</option>{(lists.clients||[]).map((c) => <option key={c}>{c}</option>)}</select>
          {hasFilter && <button onClick={() => setFl({status:"",product:"",area:"",engagementFormat:"",client:"",q:""})} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#9ca3af",display:"flex",alignItems:"center",gap:4}}><SVG d={IC.x} size={12}/> Clear</button>}
        </div>
        <p style={{fontSize:11,color:"#9ca3af"}}>{filtered.length} of {reqs.length} requests</p>
      </Card>
      {filtered.length === 0
        ? <div style={{textAlign:"center",padding:60,color:"#9ca3af"}}>No requests match your filters</div>
        : filtered.map((r) => (
          <div key={r.id} style={{background:"#fff",borderRadius:12,border:"1px solid #e5e7eb",overflow:"hidden"}}>
            <div onClick={() => setExp(exp===r.id?null:r.id)} style={{padding:16,cursor:"pointer",display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:12}}>
              <div style={{minWidth:0,flex:1}}>
                <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
                  <StatusPill status={r.status}/>
                  <PriBadge p={r.priority}/>
                  {r.product && <span style={{fontSize:11,background:"#eef2ff",color:"#4f46e5",padding:"2px 8px",borderRadius:999,fontWeight:500}}>{r.product}</span>}
                  {r.productArea && <span style={{fontSize:11,background:"#ede9fe",color:"#6d28d9",padding:"2px 8px",borderRadius:999,fontWeight:500}}>{r.productArea}</span>}
                  {r.engagementFormat && <span style={{fontSize:11,background:"#fdf4ff",color:"#a21caf",padding:"2px 8px",borderRadius:999,fontWeight:500}}>{r.engagementFormat}</span>}
                  {(r.client||[]).map((c,i) => <span key={i} style={{fontSize:11,background:"#f5f3ff",color:"#7c3aed",padding:"2px 8px",borderRadius:999}}>{c}</span>)}
                </div>
                <p style={{fontSize:14,fontWeight:500,color:"#111827"}}>{r.title}</p>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                <span style={{fontSize:11,color:"#9ca3af"}}>{new Date(r.createdAt).toLocaleDateString()}</span>
                <SVG d={exp===r.id?IC.chevU:IC.chevD} size={14} color="#9ca3af"/>
              </div>
            </div>
            {exp === r.id && (
              <div style={{padding:"0 16px 16px",borderTop:"1px solid #f3f4f6",paddingTop:12,display:"flex",flexDirection:"column",gap:10}}>
                {r.description && <p style={{fontSize:13,color:"#374151"}}>{r.description}</p>}
                {r.tags && r.tags.length > 0 && <div style={{display:"flex",flexWrap:"wrap",gap:6}}>{r.tags.map((t,i) => <Tag key={i}>{t}</Tag>)}</div>}
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                  <p style={{fontSize:11,color:"#9ca3af"}}>{r.submittedBy && <span>By <strong style={{color:"#6b7280"}}>{r.submittedBy}</strong></span>}</p>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <span style={{fontSize:11,color:"#9ca3af"}}>Move to:</span>
                    {Object.keys(STATUS).map((s) => (
                      <button key={s} onClick={() => onStatus(r.id,s)} style={{padding:"5px 10px",borderRadius:8,fontSize:11,fontWeight:500,cursor:"pointer",border:r.status===s?"none":"1px solid #e5e7eb",background:r.status===s?STATUS[s].bg:"#f3f4f6",color:r.status===s?STATUS[s].color:"#6b7280"}}>{s}</button>
                    ))}
                    <button onClick={() => setEditing(r)} style={{padding:"5px 10px",borderRadius:8,fontSize:11,fontWeight:500,cursor:"pointer",background:"#eff6ff",color:"#2563eb",border:"1px solid #bfdbfe"}}>Edit</button>
                    <button onClick={() => onRemove(r.id)} style={{padding:"5px 10px",borderRadius:8,fontSize:11,fontWeight:500,cursor:"pointer",background:"#fef2f2",color:"#dc2626",border:"1px solid #fecaca"}}>Remove</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        ))
      }
      {editing && <EditModal request={editing} lists={lists} onSave={(updated) => { onEdit(updated); setEditing(null); setExp(null); }} onClose={() => setEditing(null)}/>}
    </div>
  );
};

// ─────────────────────────────────────────────────────────────────────────────
// AI INSIGHTS
// ─────────────────────────────────────────────────────────────────────────────
const AIQuery = ({reqs}) => {
  const [q, setQ] = useState(""); const [loading, setLoading] = useState(false);
  const [res, setRes] = useState(null); const [asked, setAsked] = useState(""); const [err, setErr] = useState(null);
  const suggestions = ["What are the most common feature requests?","Which clients have the most pending requests?","Are there similar or duplicate requests?","What product areas need the most attention?","Break down requests by Engagement Format","List all high priority backlog items"];
  const ask = async (qry) => {
    if (!qry.trim() || loading) return;
    if (!ANTH_KEY) { setErr("Add your Anthropic API key to ANTH_KEY in the file to enable AI Insights."); return; }
    setLoading(true); setRes(null); setErr(null); setAsked(qry);
    const ctx = JSON.stringify(reqs.map((r) => ({title:r.title,description:r.description,product:r.product,productArea:r.productArea,engagementFormat:r.engagementFormat,client:r.client,tags:r.tags,priority:r.priority,status:r.status,submittedBy:r.submittedBy,date:r.createdAt?r.createdAt.split("T")[0]:""})));
    try {
      const resp = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":ANTH_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:"You are a product analytics assistant. Analyze the feature request database and answer insightfully using markdown. Be specific with counts, examples, and patterns.",messages:[{role:"user",content:"Feature requests:\n"+ctx+"\n\nQuestion: "+qry}]})});
      const data = await resp.json();
      setRes(data.content && data.content.find((b) => b.type==="text") ? data.content.find((b) => b.type==="text").text : "No response.");
    } catch(e) { setErr("Request failed: " + e.message); }
    setLoading(false);
  };
  return (
    <div style={{maxWidth:700,margin:"0 auto",display:"flex",flexDirection:"column",gap:16}}>
      <Card>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
          <div style={{width:24,height:24,background:"#7c3aed",borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center"}}><SVG d={IC.spark} size={14} color="#fff"/></div>
          <h2 style={{fontSize:15,fontWeight:600,color:"#111827"}}>AI Insights</h2>
        </div>
        <p style={{fontSize:13,color:"#6b7280",marginBottom:14}}>Ask anything about your {reqs.length} requests — trends, patterns, duplicates, or breakdowns.</p>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <input value={q} onChange={(e) => setQ(e.target.value)} onKeyDown={(e) => { if (e.key==="Enter") ask(q); }} placeholder="e.g. What are the top trends in the backlog?" style={Object.assign({},IS,{flex:1})}/>
          <Btn onClick={() => ask(q)} disabled={!q.trim()||loading} style={{background:q.trim()&&!loading?"#7c3aed":"#f3f4f6",color:q.trim()&&!loading?"#fff":"#9ca3af",display:"flex",alignItems:"center",gap:6}}>
            {loading ? <span className="spin"><SVG d={IC.spin} size={14} color="#9ca3af"/></span> : "Ask"}
          </Btn>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {suggestions.map((s) => <button key={s} onClick={() => { setQ(s); ask(s); }} style={{fontSize:11,padding:"4px 10px",background:"#f5f3ff",color:"#6d28d9",border:"none",borderRadius:999,cursor:"pointer"}}>{s}</button>)}
        </div>
      </Card>
      {loading && <Card style={{display:"flex",alignItems:"center",gap:12}}><span className="spin"><SVG d={IC.spin} size={18} color="#7c3aed"/></span><p style={{fontSize:13,color:"#6b7280"}}>Analyzing {reqs.length} requests…</p></Card>}
      {res && !loading && <Card><p style={{fontSize:11,color:"#9ca3af",fontStyle:"italic",marginBottom:12}}>"{asked}"</p><MD text={res}/></Card>}
      {err && <div style={{background:"#fef2f2",borderRadius:12,border:"1px solid #fecaca",padding:16,fontSize:13,color:"#dc2626"}}>{err}</div>}
    </div>
  );
};

// ─────────────────────────────────────────────────────────────────────────────
// APP
// ─────────────────────────────────────────────────────────────────────────────
const App = () => {
  const [view, setView]               = useState("dashboard");
  const [reqs, setReqs]               = useState([]);
  const [ready, setReady]             = useState(false);
  const [syncing, setSyncing]         = useState(false);
  const [boardFilters, setBoardFilters] = useState({});

  const navigateBoard = (filters) => { setBoardFilters(filters); setView("board"); };

  useEffect(() => {
    (async () => {
      setSyncing(true);
      try { const data = await loadData(); setReqs(data.map(normalizeRecord)); }
      catch(e) { alert("Could not load data from Gist. Error: " + e.message); }
      setSyncing(false); setReady(true);
    })();
  }, []);

  const persist = useCallback(async (updated) => {
    setSyncing(true);
    try { await saveData(updated); setReqs(updated); }
    catch(e) { alert("Failed to save. Error: " + e.message); }
    setSyncing(false);
  }, []);

  const addReq     = (form)     => persist([Object.assign({},form,{id:uid(),status:"Backlog",createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()})].concat(reqs));
  const updStatus  = (id,s)     => persist(reqs.map((r) => r.id===id ? Object.assign({},r,{status:s,updatedAt:new Date().toISOString()}) : r));
  const updateReq  = (updated)  => persist(reqs.map((r) => r.id===updated.id ? Object.assign({},updated,{updatedAt:new Date().toISOString()}) : r));
  const removeReq  = (id)       => persist(reqs.filter((r) => r.id !== id));
  const importReqs = (rows)     => persist(rows.concat(reqs));
  const deleteClassValue = useCallback((field, value) => {
    persist(reqs.map((r) => {
      if (field === "client") return Object.assign({},r,{client:(r.client||[]).filter((c) => c!==value),updatedAt:new Date().toISOString()});
      if (r[field] === value) return Object.assign({},r,{[field]:"",updatedAt:new Date().toISOString()});
      return r;
    }));
  }, [reqs, persist]);

  const uniq = (key) => Array.from(new Set(reqs.map((r) => r[key]).filter(Boolean))).sort();
  const lists = useMemo(() => ({
    products:          uniq("product"),
    productAreas:      uniq("productArea"),
    engagementFormats: uniq("engagementFormat"),
    clients:           Array.from(new Set(reqs.flatMap((r) => Array.isArray(r.client)?r.client:(r.client?[r.client]:[])).filter(Boolean))).sort(),
    teamMembers:       Array.from(new Set(["Alex","Jordan","Sam","Taylor","Morgan"].concat(reqs.map((r) => r.submittedBy).filter(Boolean)))).sort()
  }), [reqs]);

  const NAV = [
    {id:"dashboard", label:"Dashboard",   icon:IC.bar},
    {id:"submit",    label:"Submit",      icon:IC.plus},
    {id:"board",     label:"Requests",    icon:IC.list},
    {id:"query",     label:"AI Insights", icon:IC.spark},
    {id:"import",    label:"Import",      icon:IC.upload},
    {id:"manage",    label:"Manage",      icon:IC.settings}
  ];

  if (!ready) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",color:"#9ca3af",fontSize:14}}>Loading from Gist…</div>;

  return (
    <div style={{minHeight:"100vh",background:"#f9fafb"}}>
      <header style={{background:"#fff",borderBottom:"1px solid #e5e7eb",padding:"10px 24px",position:"sticky",top:0,zIndex:20}}>
        <div style={{maxWidth:1200,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:28,height:28,background:"#4f46e5",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center"}}><SVG d={IC.zap} size={16} color="#fff"/></div>
            <span style={{fontSize:17,fontWeight:700,color:"#111827"}}>FeatureTrack</span>
            <span style={{fontSize:11,color:"#9ca3af",background:"#f3f4f6",padding:"2px 8px",borderRadius:999,marginLeft:4}}>{reqs.length} request{reqs.length!==1?"s":""}</span>
            {syncing && <span style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:"#6366f1"}}><span className="spin"><SVG d={IC.spin} size={11} color="#6366f1"/></span>Saving…</span>}
          </div>
          <nav style={{display:"flex",gap:4}}>
            {NAV.map(({id,label,icon}) => (
              <button key={id} onClick={() => setView(id)} style={{display:"flex",alignItems:"center",gap:6,padding:"7px 12px",borderRadius:8,fontSize:13,fontWeight:500,border:"none",cursor:"pointer",background:view===id?"#4f46e5":"transparent",color:view===id?"#fff":"#6b7280"}}>
                <SVG d={icon} size={14} color={view===id?"#fff":"#6b7280"}/>{label}
              </button>
            ))}
          </nav>
        </div>
      </header>
      <main style={{maxWidth:1200,margin:"0 auto",padding:"28px 24px"}}>
        {view==="dashboard" && <Dashboard reqs={reqs} onImport={() => setView("import")} onNavigate={navigateBoard} onStatus={updStatus}/>}
        {view==="submit"    && <SubmitForm onSubmit={addReq} onDone={() => setView("board")} lists={lists}/>}
        {view==="board"     && <Board key={JSON.stringify(boardFilters)} reqs={reqs} onStatus={updStatus} onRemove={removeReq} onEdit={updateReq} lists={lists} initialFilters={boardFilters} onBack={Object.keys(boardFilters).length?() => setView("dashboard"):null}/>}
        {view==="query"     && <AIQuery reqs={reqs}/>}
        {view==="import"    && <ImportView onImport={importReqs} onDone={() => setView("dashboard")}/>}
        {view==="manage"    && <ManageView lists={lists} onDelete={deleteClassValue}/>}
      </main>
    </div>
  );
};

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
